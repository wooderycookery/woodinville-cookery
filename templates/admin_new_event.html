{% extends "base.html" %}
{% block title %}New Event{% endblock %}
{% block content %}
<nav>
  <a href="{{ url_for('admin_dashboard') }}">← Dashboard</a>
</nav>
<h1>New Event</h1>
<form method="POST" style="margin-top:24px">
  <label>Event Name</label>
  <input type="text" name="name" required placeholder="Spring Dinner Party">

  <label>Date & Time</label>
  <input type="datetime-local" name="date" required>

  <label>Location</label>
  <input type="text" name="location" placeholder="123 Main St, Woodinville">

  <label>Description</label>
  <textarea name="description" placeholder="Join us for an evening of..."></textarea>

  <label>Google Photos Album URL (optional)</label>
  <input type="text" name="photos_album_url" placeholder="https://photos.google.com/...">

  <button type="submit" class="btn">Create Event</button>
</form>
{% endblock %}
