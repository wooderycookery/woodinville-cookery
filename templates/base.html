<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Woodinville Cookery Society{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, serif; background: #faf8f4; color: #2c2c2c; }
    .container { max-width: 680px; margin: 48px auto; padding: 0 24px; }
    h1 { font-size: 2rem; margin-bottom: 8px; color: #3b2f1e; }
    h2 { font-size: 1.4rem; margin: 24px 0 12px; color: #3b2f1e; }
    p { line-height: 1.7; margin-bottom: 12px; }
    a { color: #7a4b1e; }
    .btn {
      display: inline-block; padding: 12px 28px; background: #7a4b1e;
      color: white; text-decoration: none; border-radius: 4px;
      border: none; cursor: pointer; font-size: 1rem; font-family: Georgia, serif;
    }
    .btn:hover { background: #5c3714; }
    .flash { background: #f0e9df; border-left: 4px solid #7a4b1e;
             padding: 12px 16px; margin-bottom: 20px; }
    label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 0.9rem; }
    input[type=text], input[type=email], input[type=password],
    input[type=datetime-local], input[type=number], textarea, select {
      width: 100%; padding: 10px; border: 1px solid #ccc;
      border-radius: 4px; font-size: 1rem; font-family: Georgia, serif;
      margin-bottom: 16px;
    }
    textarea { min-height: 100px; resize: vertical; }
    .meta { font-size: 0.85rem; color: #666; margin-bottom: 6px; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #e5e0d8; }
    th { background: #f0e9df; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .tag-yes { color: #2d7a2d; font-weight: bold; }
    .tag-no  { color: #b04040; font-weight: bold; }
    .tag-pending { color: #888; }
    nav { margin-bottom: 32px; font-size: 0.9rem; }
    nav a { margin-right: 16px; }
  </style>
</head>
<body>
  <div class="container">
    {% with messages = get_flashed_messages() %}
      {% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
